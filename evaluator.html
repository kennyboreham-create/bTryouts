<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Evaluation Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

  <!-- LOGIN SCREEN LAYER -->
  <div id="loginLayer" class="fixed inset-0 bg-blue-900 flex items-center justify-center p-4 z-[100]">
    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-blue-900">⚡ Tryouts Portal Login</h2>
        <p class="text-gray-500 text-sm mt-1">Enter your registered credentials to proceed</p>
      </div>
      
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Your Name / Identifier</label>
          <input type="text" id="loginName" required placeholder="e.g. Coach Smith" class="w-full border-2 border-gray-300 rounded p-2 focus:border-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Access Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••" class="w-full border-2 border-gray-300 rounded p-2 focus:border-blue-500 focus:outline-none">
        </div>
        <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded transition">
          Authorize Session
        </button>
        <div id="loginError" class="hidden text-center text-sm font-semibold bg-red-100 text-red-800 p-2 rounded"></div>
      </form>
    </div>
  </div>

  <!-- MAIN APP INTERFACE -->
  <div id="appLayer" class="hidden">
    <form id="evaluationForm">
      
      <!-- Mandatory Top Category Target Header Bar -->
      <header class="sticky top-0 bg-blue-900 text-white shadow-md z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
          <h1 class="text-xl font-bold tracking-wide">⚡ Tryouts Input Portal</h1>
          
          <div class="flex gap-2 w-full sm:w-auto">
            <select id="ageFilter" required class="bg-blue-800 text-white border-2 border-blue-600 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 w-1/2 sm:w-36">
              <option value="">Select Age *</option>
              <option value="9U">9U</option>
              <option value="11U">11U</option>
              <option value="12U">12U</option>
              <option value="13U">13U</option>
              <option value="15U">15U</option>
            </select>

            <select id="tierFilter" required class="bg-blue-800 text-white border-2 border-blue-600 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 w-1/2 sm:w-40">
              <option value="">Select Tier *</option>
              <option value="Tier 1">Tier 1</option>
              <option value="Tier 2">Tier 2</option>
              <option value="House League">House League</option>
            </select>
          </div>
        </div>
      </header>

      <main class="max-w-4xl mx-auto p-4">
        <div class="bg-white rounded-lg shadow p-5 space-y-6">
          
          <!-- Roster Key Reference Row -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 border-b pb-4">
            <div>
              <label class="block text-sm font-semibold uppercase text-gray-500 mb-1">Player # / Bib ID</label>
              <input type="text" id="playerNumber" required placeholder="e.g. 42" class="w-full border-2 border-gray-300 rounded p-2 text-lg font-bold focus:border-blue-500 focus:outline-none">
            </div>
            <div>
              <label class="block text-sm font-semibold uppercase text-gray-500 mb-1">Active Evaluator ID</label>
              <input type="text" id="evaluatorId" readonly class="w-full bg-gray-100 border-2 border-gray-200 rounded p-2 text-lg text-gray-500 outline-none font-mono text-sm">
            </div>
          </div>

          <!-- Dynamic Expandable Skills Matrix Block -->
          <div>
            <h3 class="text-sm font-bold uppercase text-gray-400 tracking-wider mb-3">Skills Metric Scorecard</h3>
            
            <!-- Injection container for dynamic lines -->
            <div id="skillsContainer" class="space-y-3 mb-4"></div>

            <button type="button" id="addSkillBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-1.5 px-4 rounded text-sm transition flex items-center gap-1">
              ➕ Add Another Skill
            </button>
          </div>

          <!-- Evaluation Field Notes -->
          <div class="border-t pt-4">
            <div class="flex justify-between text-sm font-bold uppercase text-gray-400 tracking-wider mb-1">
              <label for="notes">Notes</label>
              <span id="wordCount">0 / 300 words</span>
            </div>
            <textarea id="notes" rows="4" maxlength="2000" placeholder="Type comments here (max 300 words)..." class="w-full border-2 border-gray-300 rounded p-2 focus:border-blue-500 focus:outline-none text-sm"></textarea>
          </div>

          <!-- Transmission Status Row -->
          <div class="flex flex-col gap-2 pt-2">
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded shadow transition">
              Submit Metric Entry
            </button>
            <div id="statusMsg" class="hidden text-center text-sm font-semibold p-2 rounded"></div>
          </div>

        </div>
      </main>
    </form>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx1YzCg4kJYNO3rskRcK4NkehSlMiibHFvlCdjy0sr3g16RgJemy2rN132UyyIEhLc/exec";
    
    // Core system metric definitions
    const SKILL_OPTIONS = ["Throwing", "Catching", "Running", "Coachability", "Effort", "Awareness"];
    let savedEvaluatorId = ""; 

    // --- LOGIN IDENTITY HANDLER ---
    async function authenticateEvaluator(name, password, loginBtn, loginError) {
      if (loginBtn) {
        loginBtn.disabled = true;
        loginBtn.innerText = "Verifying Identity...";
      }
      if (loginError) loginError.className = "hidden";

      const orgId = localStorage.getItem('orgId');
      const payload = { name, password };
      if (orgId) payload.orgId = orgId;

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: "loginUser",
            payload
          })
        });
        const result = await response.json();

        if (result.success) {
          if (result.role !== "evaluator" && result.role !== "coach" && result.role !== "admin") {
            throw new Error("Access Denied: Your account role lacks clearance parameters.");
          }

          savedEvaluatorId = result.id || result._id || "ID_NOT_RETURNED";

          document.getElementById('evaluatorId').value = savedEvaluatorId;
          document.getElementById('loginLayer').classList.add('hidden');
          document.getElementById('appLayer').classList.remove('hidden');

          createSkillRow();
          return true;
        }

        throw new Error(result.error || "Wrong credentials");
      } catch (err) {
        if (loginError) {
          loginError.innerText = err.message;
          loginError.className = "block bg-red-100 text-red-800 text-center text-sm font-semibold p-2 rounded mt-2";
        }
        return false;
      } finally {
        if (loginBtn) {
          loginBtn.disabled = false;
          loginBtn.innerText = "Authorize Session";
        }
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('loginName').value.trim();
      const password = document.getElementById('loginPassword').value;
      localStorage.setItem('userPassword', password);
      await authenticateEvaluator(name, password, document.getElementById('loginBtn'), document.getElementById('loginError'));
    });

    // Auto-login when arriving from index.html with stored session credentials
    (async function tryAutoLoginFromSession() {
      const storedName = localStorage.getItem('userName');
      const storedPassword = localStorage.getItem('userPassword');
      const storedRole = localStorage.getItem('userRole');
      if (storedName && storedPassword && storedRole === 'evaluator') {
        document.getElementById('loginName').value = storedName;
        await authenticateEvaluator(storedName, storedPassword);
      } else if (!storedName || !storedPassword) {
        window.location.href = "index.html";
      }
    })();

    // --- DYNAMIC MATRIX COMPONENT BUILDER ---
    function createSkillRow() {
      const container = document.getElementById('skillsContainer');
      const rowId = 'row_' + Date.now() + Math.random().toString(36).substr(2, 4);

      const row = document.createElement('div');
      row.id = rowId;
      row.className = "flex items-center gap-3 bg-gray-50 p-2 rounded border border-gray-200 animate-fadeIn";

      // Build options structure
      let optionHTML = '<option value="">Choose Skill...</option>';
      SKILL_OPTIONS.forEach(opt => {
        optionHTML += `<option value="${opt}">${opt}</option>`;
      });

      row.innerHTML = `
        <select required class="w-2/3 border-2 border-gray-300 rounded p-1.5 text-sm focus:border-blue-500 focus:outline-none">
          ${optionHTML}
        </select>
        <input type="number" required min="1" max="10" placeholder="Score (1-10)" class="w-1/3 border-2 border-gray-300 rounded p-1.5 text-sm text-center focus:border-blue-500 focus:outline-none">
        <button type="button" onclick="document.getElementById('${rowId}').remove()" class="text-gray-400 hover:text-red-600 font-bold px-2 text-lg" title="Remove Field">✕</button>
      `;

      container.appendChild(row);
    }

    document.getElementById('addSkillBtn').addEventListener('click', createSkillRow);

    // --- WORD COUNT COCKPIT ---
    const textObj = document.getElementById('notes');
    textObj.addEventListener('input', function() {
      const words = this.value.trim().split(/\s+/).filter(Boolean);
      document.getElementById('wordCount').innerText = `${words.length} / 300 words`;
      if(words.length > 300) this.classList.add('border-red-500');
      else this.classList.remove('border-red-500');
    });

    // --- DATA CAPTURE AND ROUTING TRANSACTION ---
    document.getElementById('evaluationForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const statusMsg = document.getElementById('statusMsg');
      
      // Secondary check for text fields
      const words = textObj.value.trim().split(/\s+/).filter(Boolean);
      if (words.length > 300) {
        alert("Please shorten notes below the 300-word ceiling guideline.");
        return;
      }

      // Read values from dynamic rows container elements
      const skillsCollector = {};
      const rows = document.getElementById('skillsContainer').children;
      
      if(rows.length === 0) {
        alert("Please input at least one matrix skill score prior to submission entry.");
        return;
      }

      for (let row of rows) {
        const selectedSkill = row.querySelector('select').value;
        const scoreVal = parseInt(row.querySelector('input').value);
        
        if (selectedSkill && !isNaN(scoreVal)) {
          skillsCollector[selectedSkill.toLowerCase()] = scoreVal;
        }
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "Transmitting to Database...";
      statusMsg.className = "hidden";

      const dataPacket = {
        action: "submitEvaluation",
        payload: {
          playerNumber: document.getElementById('playerNumber').value.trim(),
          evaluatorId: savedEvaluatorId,
          age: document.getElementById('ageFilter').value,
          tier: document.getElementById('tierFilter').value,
          skills: skillsCollector,
          notes: textObj.value.trim()
        }
      };

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(dataPacket)
        });
        const result = await response.json();

        if (result.success) {
          statusMsg.innerText = `Success! Saved data for Player #${dataPacket.payload.playerNumber}.`;
          statusMsg.className = "block bg-green-100 text-green-800 text-center text-sm font-semibold p-2 rounded";
          
          // Clear operational inputs while retaining configuration categories
          document.getElementById('playerNumber').value = '';
          textObj.value = '';
          document.getElementById('wordCount').innerText = "0 / 300 words";
          
          // Flush and clear matrix stack back down to single baseline entry row
          document.getElementById('skillsContainer').innerHTML = "";
          createSkillRow();
          
          document.getElementById('playerNumber').focus();
        } else {
          throw new Error(result.error || "Unhandled service processing variance.");
        }
      } catch (err) {
        statusMsg.innerText = `Error: ${err.message}`;
        statusMsg.className = "block bg-red-100 text-red-800 text-center text-sm font-semibold p-2 rounded";
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Metric Entry";
      }
    });
  </script>
</body>
</html>
