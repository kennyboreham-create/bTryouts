<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Tryouts SaaS Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    :root { --primary: #1e3a8a; }
    body { background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-card { background: white; padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 480px; box-shadow: 0 20px 45px rgba(0,0,0,0.3); }
    .status-banner { padding: 0.75rem; border-radius: 6px; font-weight: bold; font-size: 0.9rem; margin-top: 1rem; display: none; text-align: center; background-color: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

  <div class="login-card">
    <div style="text-align: center; margin-bottom: 2rem;">
      <h2 style="color: #1e3a8a; margin-bottom: 0.25rem; font-weight: 800;">Tryout Matrix Sign-In</h2>
      <p style="color: #64748b; font-size: 0.95rem;">Enter your organizational access credentials below</p>
    </div>
    
    <form id="masterLoginForm">
      <label for="orgId">Organization ID</label>
      <input type="text" id="orgId" required placeholder="e.g. hhmba" style="text-transform: lowercase;">

      <label for="username">User Identity / Name</label>
      <input type="text" id="username" required placeholder="e.g. Coach Miller">
      
      <label for="password">Access Password</label>
      <input type="password" id="password" required placeholder="••••••••">

      <label for="userRole">Portal Access Tier Role</label>
      <select id="userRole" required>
        <option value="" disabled selected>Select assigned authorization role...</option>
        <option value="evaluator">Evaluator (Field Grading Sheet)</option>
        <option value="coach">Coach (Review & Roster Board)</option>
        <option value="admin">Administrator (League Configurations)</option>
      </select>
      
      <button type="submit" id="submitBtn" style="width: 100%; margin-top: 1rem; font-weight: bold;">
        Authenticate Secure Session
      </button>
      <div id="loginError" class="status-banner"></div>
    </form>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx1YzCg4kJYNO3rskRcK4NkehSlMiibHFvlCdjy0sr3g16RgJemy2rN132UyyIEhLc/exec";

    document.getElementById('masterLoginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('loginError');
      
      const orgId = document.getElementById('orgId').value.trim().toLowerCase();
      const name = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const selectedRole = document.getElementById('userRole').value;

      btn.disabled = true;
      btn.innerText = "Authorizing Identity Signatures...";
      errorDiv.style.display = "none";

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: "loginUser",
            payload: { orgId, name, password }
          })
        });
        const result = await response.json();

        if (result.success) {
          // Explicitly safety check role assertions to prevent login profile masquerading
          if (result.role !== selectedRole) {
            throw new Error(`Access Denied: Logged profile matches role '${result.role}', not target '${selectedRole}'.`);
          }
          
          // Seed session data to client local memory states safely
          localStorage.setItem('orgId', orgId);
          localStorage.setItem('orgName', result.orgName || orgId.toUpperCase());
          localStorage.setItem('userName', result.name);
          localStorage.setItem('userRole', result.role);
          localStorage.setItem('userAge', result.age || "All");
          localStorage.setItem('userTier', result.tier || "All");

          // Route user package onto corresponding dashboard file targets smoothly
          if (selectedRole === "coach") window.location.href = "coach.html";
          else if (selectedRole === "evaluator") window.location.href = "evaluator.html";
          else if (selectedRole === "admin") window.location.href = "admin.html";

        } else {
          throw new Error(result.error || "Invalid Organization, Username, or Password combination.");
        }
      } catch (err) {
        errorDiv.innerText = err.message;
        errorDiv.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.innerText = "Authenticate Secure Session";
      }
    });
  </script>
</body>
</html>
